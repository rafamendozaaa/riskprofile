<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de Riesgo — BlackToro Global Wealth Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8922A;--gold-light:#F0D080;--amber-mid:#BA7517;
  --color-text-primary:#1a1a1a;--color-text-secondary:#6b6b6b;
  --color-background-primary:#ffffff;--color-background-secondary:#f7f6f3;
  --color-border-tertiary:rgba(0,0,0,0.12);--color-border-secondary:rgba(0,0,0,0.25);
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --border-radius-md:8px;--border-radius-lg:12px
}
@media(prefers-color-scheme:dark){
  :root{
    --color-text-primary:#f0f0f0;--color-text-secondary:#a0a0a0;
    --color-background-primary:#1e1e1e;--color-background-secondary:#2a2a2a;
    --color-border-tertiary:rgba(255,255,255,0.1);--color-border-secondary:rgba(255,255,255,0.2)
  }
}
body{font-family:var(--font-sans);background:#f2f0eb;min-height:100vh;padding:2rem 1rem;color:var(--color-text-primary)}
@media(prefers-color-scheme:dark){body{background:#111}}
.page{max-width:680px;margin:0 auto;background:var(--color-background-primary);border-radius:16px;padding:2rem;border:0.5px solid var(--color-border-tertiary)}
.wrap{padding:0}
.header{border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:1rem;margin-bottom:1.5rem}
.brand{font-size:11px;font-weight:500;letter-spacing:0.12em;color:var(--color-text-secondary);text-transform:uppercase;margin-bottom:4px}
.brand span{color:var(--amber-mid)}
.title-main{font-size:20px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.subtitle{font-size:13px;color:var(--color-text-secondary);margin-top:4px;line-height:1.5}
.progress-bar{margin:1.25rem 0;display:flex;flex-direction:column;gap:6px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary)}
.progress-track{height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--amber-mid);border-radius:2px;transition:width 0.4s ease}
.q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.q-number{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--amber-mid);margin-bottom:8px;text-transform:uppercase}
.q-text{font-size:16px;font-weight:500;color:var(--color-text-primary);line-height:1.4;margin-bottom:10px}
.q-why{background:var(--color-background-secondary);border-left:2.5px solid var(--amber-mid);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 14px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1rem}
.q-why strong{color:var(--color-text-primary);font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;transition:border-color 0.15s,background 0.15s}
.opt:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.opt.selected{border-color:var(--amber-mid);background:var(--color-background-secondary)}
.opt-radio{width:16px;height:16px;min-width:16px;border-radius:50%;border:1.5px solid var(--color-border-secondary);margin-top:2px;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s}
.opt.selected .opt-radio{border-color:var(--amber-mid)}
.opt.selected .opt-radio::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--amber-mid)}
.opt-label{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.opt-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px;line-height:1.5}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;gap:12px}
.btn{padding:9px 20px;font-size:13px;font-weight:500;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);font-family:var(--font-sans);transition:background 0.15s}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:var(--amber-mid);color:#fff;border-color:var(--amber-mid)}
.btn.primary:hover{background:#9A6210}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;margin-bottom:1rem}
.result-score{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
.score-circle{width:72px;height:72px;min-width:72px;border-radius:50%;border:2.5px solid var(--amber-mid);display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:22px;font-weight:500;color:var(--amber-mid)}
.score-den{font-size:11px;color:var(--color-text-secondary)}
.profile-badge{display:inline-block;background:var(--color-background-secondary);border:0.5px solid var(--amber-mid);color:var(--amber-mid);font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:var(--border-radius-md);margin-bottom:6px}
.profile-name{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.profile-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-top:10px;margin-bottom:1.25rem}
.alloc-section{border-top:0.5px solid var(--color-border-tertiary);padding-top:1.25rem;margin-bottom:1.25rem}
.alloc-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-secondary);margin-bottom:1rem}
.alloc-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.alloc-label{font-size:13px;color:var(--color-text-primary);width:180px;min-width:140px}
.alloc-bar-track{flex:1;height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.alloc-bar{height:100%;border-radius:4px;transition:width 0.6s ease}
.alloc-val{font-size:12px;color:var(--color-text-secondary);min-width:60px;text-align:right}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.insight-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;border:0.5px solid var(--color-border-tertiary)}
.insight-label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.insight-value{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.next-steps{border-top:0.5px solid var(--color-border-tertiary);padding-top:1.25rem}
.ns-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-secondary);margin-bottom:12px}
.ns-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:var(--color-text-secondary);line-height:1.5}
.ns-dot{width:6px;height:6px;min-width:6px;border-radius:50%;background:var(--amber-mid);margin-top:5px}
.disclaimer{font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);padding-top:1rem;margin-top:1rem;line-height:1.6;font-style:italic}
.hidden{display:none}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.restart-btn{font-size:13px;color:var(--color-text-secondary);background:none;border:0.5px solid var(--color-border-tertiary);padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-family:var(--font-sans)}
.restart-btn:hover{background:var(--color-background-secondary)}
@media(max-width:500px){.insight-grid{grid-template-columns:1fr}.alloc-label{min-width:100px;width:120px}.page{padding:1.25rem}}
</style>
</head>
<body>
<div class="page">
<div class="wrap">
<div class="header">
  <div class="brand">Black<span>Toro</span> Global Wealth Management</div>
  <div class="title-main">Cuestionario de Perfil de Riesgo</div>
  <div class="subtitle">Responda con honestidad — no hay respuestas correctas o incorrectas. El objetivo es entender su situación real para diseñar la estrategia que mejor se adapte a usted.</div>
</div>

<div class="progress-bar">
  <div class="progress-meta">
    <span id="prog-label">Pregunta 1 de 10</span>
    <span id="prog-pct">10%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>
</div>

<div id="quiz-area"></div>
<div id="result-area" class="hidden"></div>
</div>
</div>

<script>
const questions=[
{id:1,title:"¿Cuál es su horizonte de inversión?",
why:"<strong>Por qué importa:</strong> El tiempo que usted puede mantener su dinero invertido sin necesitarlo es probablemente el factor más importante. A mayor plazo, mayor capacidad de absorber volatilidad y recuperarse de caídas del mercado. Un inversor con 10+ años puede asumir más riesgo que uno que necesitará el dinero en 1 año.",
options:[
{label:"Menos de 1 año",desc:"Necesito acceder al capital en el corto plazo.",score:1},
{label:"1 a 3 años",desc:"Plazo corto-medio. Priorizo proteger el capital.",score:2},
{label:"3 a 5 años",desc:"Plazo medio. Puedo tolerar algo de variación.",score:3},
{label:"5 a 10 años",desc:"Plazo largo. Busco crecimiento sostenido.",score:4},
{label:"Más de 10 años",desc:"Horizonte muy largo. Puedo esperar ciclos completos del mercado.",score:5}
]},
{id:2,title:"¿Cuál es su objetivo principal de inversión?",
why:"<strong>Por qué importa:</strong> Distintos objetivos requieren distintas estrategias. La preservación de capital implica activos muy seguros con menor retorno. La apreciación de capital requiere mayor exposición a renta variable y mayor tolerancia al riesgo. Es clave ser realista: retorno y riesgo van siempre de la mano.",
options:[
{label:"Preservar el capital",desc:"Mi prioridad es no perder. Acepto retornos bajos a cambio de seguridad.",score:1},
{label:"Generar ingresos regulares",desc:"Quiero flujos de caja periódicos (dividendos, cupones) con riesgo controlado.",score:2},
{label:"Equilibrio entre ingresos y crecimiento",desc:"Busco una combinación: algo de flujo más apreciación moderada.",score:3},
{label:"Crecimiento del capital",desc:"Priorizo que mi patrimonio crezca. Acepto volatilidad en el corto plazo.",score:4},
{label:"Máximo crecimiento a largo plazo",desc:"Busco el mayor retorno posible, asumiendo riesgos significativos si es necesario.",score:5}
]},
{id:3,title:"¿Qué pérdida máxima podría tolerar en un año sin tomar decisiones impulsivas?",
why:"<strong>Por qué importa:</strong> Esta pregunta mide su tolerancia real, no la declarada. Muchos inversores sobreestiman su tolerancia al riesgo en mercados alcistas. Las caídas son parte del proceso de inversión: el S&P 500 cae en promedio un 14% durante el año en algún momento, incluso en años con retorno positivo. Ser honesto aquí evita decisiones costosas en momentos de estrés.",
options:[
{label:"No aceptaría ninguna pérdida",desc:"Cualquier pérdida me generaría una ansiedad significativa.",score:1},
{label:"Hasta -5%",desc:"Una pérdida pequeña sería tolerable si es temporal.",score:2},
{label:"Hasta -15%",desc:"Entiendo que los mercados fluctúan y puedo esperar la recuperación.",score:3},
{label:"Hasta -25%",desc:"Tengo experiencia con volatilidad y puedo mantener la calma.",score:4},
{label:"Más de -25%",desc:"Las caídas fuertes son oportunidades. Tengo convicción en el largo plazo.",score:5}
]},
{id:4,title:"Si su cartera cayera un 20% en 3 meses, ¿qué haría?",
why:"<strong>Por qué importa:</strong> Esta es una pregunta de comportamiento — la más reveladora del cuestionario. Los estudios muestran que la mayoría de los inversores venden en los peores momentos y compran tarde. Su respuesta indica qué tan probable es que tome decisiones emocionales que destruyan valor. No hay respuesta 'incorrecta', pero sí consecuencias financieras distintas.",
options:[
{label:"Vendería todo inmediatamente",desc:"No puedo permitirme seguir perdiendo. La seguridad es primero.",score:1},
{label:"Vendería una parte para reducir la exposición",desc:"Preferiría reducir el riesgo aunque signifique consolidar parte de la pérdida.",score:2},
{label:"No haría nada y esperaría",desc:"Entiendo que es temporal. Mantendría la cartera como está.",score:3},
{label:"Compraría un poco más aprovechando los precios bajos",desc:"Vería la caída como una oportunidad de promedio hacia abajo.",score:4},
{label:"Compraría significativamente más",desc:"Las caídas son las mejores oportunidades de entrada a largo plazo.",score:5}
]},
{id:5,title:"¿Con qué frecuencia necesita liquidez (acceso al dinero invertido)?",
why:"<strong>Por qué importa:</strong> La liquidez tiene un costo: activos más líquidos (como depósitos o bonos cortos) ofrecen menos retorno. Si necesita acceder frecuentemente al capital, no puede asumir activos ilíquidos como private equity, bonos largos o propiedades. Ser claro en esto evita vender inversiones a destiempo y a precios desfavorables.",
options:[
{label:"Necesito acceso inmediato y frecuente",desc:"Podría necesitar el dinero en cualquier momento.",score:1},
{label:"Podría necesitarlo en menos de 1 año",desc:"Mantengo el capital como reserva para eventualidades.",score:2},
{label:"No lo necesitaré por 1 a 3 años",desc:"Tengo otras fuentes de liquidez para el corto plazo.",score:3},
{label:"No lo necesitaré por 3 a 7 años",desc:"Esta inversión es separada de mis necesidades cotidianas.",score:4},
{label:"No lo necesitaré por más de 7 años",desc:"Este capital está totalmente separado y puedo bloquearlo a largo plazo.",score:5}
]},
{id:6,title:"¿Qué tan estables son sus ingresos actuales?",
why:"<strong>Por qué importa:</strong> Sus ingresos son su 'red de seguridad'. Si sus ingresos son estables y cubrirán sus gastos independientemente de cómo se comporte su cartera, puede asumir mayor riesgo inversor. Si sus ingresos son variables o dependen de su cartera, necesita una estrategia más conservadora para no verse obligado a liquidar en malos momentos.",
options:[
{label:"Muy inestables o desempleo actual",desc:"No tengo certeza sobre mis ingresos próximos.",score:1},
{label:"Variable o ingresos propios con incertidumbre",desc:"Mis ingresos dependen de negocios o comisiones con variabilidad.",score:2},
{label:"Relativamente estables",desc:"Tengo ingresos regulares con algo de variabilidad.",score:3},
{label:"Estables y predecibles",desc:"Empleo fijo o renta que cubre mis necesidades con holgura.",score:4},
{label:"Muy estables, diversificados y holgados",desc:"Múltiples fuentes de ingresos que superan ampliamente mis gastos.",score:5}
]},
{id:7,title:"¿Cuál es su experiencia y conocimiento en inversiones?",
why:"<strong>Por qué importa:</strong> Invertir en activos que no se comprenden bien genera decisiones emocionales y errores costosos. No es una limitación permanente — la educación financiera es parte de lo que hacemos — pero sí es relevante para diseñar una estrategia donde usted se sienta cómodo y entienda qué tiene en su cartera y por qué.",
options:[
{label:"Ninguna experiencia",desc:"Nunca he invertido. Desconozco los distintos tipos de activos.",score:1},
{label:"Básica — solo depósitos o fondos simples",desc:"Conozco productos bancarios básicos pero poco sobre mercados.",score:2},
{label:"Moderada — acciones y bonos",desc:"Entiendo cómo funcionan los mercados financieros en términos generales.",score:3},
{label:"Alta — carteras diversificadas y ETFs",desc:"Gestiono o he gestionado carteras con distintos activos. Entiendo el ciclo económico.",score:4},
{label:"Avanzada — derivados, alternativos, private equity",desc:"Experiencia amplia en productos complejos y estrategias sofisticadas.",score:5}
]},
{id:8,title:"¿Qué porcentaje de su patrimonio total representa el capital a invertir?",
why:"<strong>Por qué importa:</strong> La diversificación aplica no solo dentro de la cartera, sino también en su patrimonio total. Si está invirtiendo el 80% de todo lo que tiene, necesita ser más conservador que si esta inversión representa solo el 20% de su patrimonio total. El contexto global de su situación financiera es fundamental.",
options:[
{label:"Más del 75% de mi patrimonio total",desc:"Este capital representa casi todo lo que tengo.",score:1},
{label:"Entre 50% y 75%",desc:"Una porción muy significativa de mi patrimonio total.",score:2},
{label:"Entre 25% y 50%",desc:"Una parte importante pero tengo otros activos fuera de esta inversión.",score:3},
{label:"Entre 10% y 25%",desc:"Esta inversión es uno de varios pilares de mi patrimonio.",score:4},
{label:"Menos del 10%",desc:"Capital disponible que complementa un patrimonio diversificado.",score:5}
]},
{id:9,title:"¿Tiene dependientes financieros o compromisos financieros importantes?",
why:"<strong>Por qué importa:</strong> Las obligaciones financieras (hijos, padres a cargo, hipotecas, deudas) crean necesidades de liquidez y reducen la capacidad de asumir pérdidas. No porque sea una 'señal de debilidad', sino porque son compromisos reales que deben estar cubiertos independientemente de cómo se comporte el mercado.",
options:[
{label:"Sí, múltiples dependientes y compromisos altos",desc:"Mantengo a varias personas y/o tengo deudas o compromisos significativos.",score:1},
{label:"Sí, algunos dependientes o compromisos",desc:"Tengo responsabilidades financieras relevantes que cubrir mensualmente.",score:2},
{label:"Compromisos moderados y manejables",desc:"Tengo algunas obligaciones pero están bien cubiertas con mis ingresos.",score:3},
{label:"Pocos compromisos, situación holgada",desc:"Mis obligaciones son menores y mis finanzas están en orden.",score:4},
{label:"Sin dependientes ni compromisos significativos",desc:"Soy financieramente independiente y sin cargas relevantes.",score:5}
]},
{id:10,title:"¿Cómo describiría su relación con el riesgo y la incertidumbre financiera?",
why:"<strong>Por qué importa:</strong> Esta pregunta captura su actitud más profunda hacia la incertidumbre — que es diferente de lo que 'debería' sentir. No existe una respuesta superior. Conocer su perfil psicológico real nos permite construir una estrategia que usted podrá mantener con convicción cuando los mercados sean difíciles, que es cuando más importa.",
options:[
{label:"Me genera mucho estrés. Necesito certeza.",desc:"La incertidumbre financiera me quita el sueño. Prefiero menos retorno y más paz.",score:1},
{label:"Me incomoda pero lo acepto con límites claros",desc:"Puedo tolerar algo de incertidumbre si los riesgos están bien acotados.",score:2},
{label:"Lo veo como parte del proceso",desc:"Entiendo que riesgo y retorno están relacionados. Mantengo la calma.",score:3},
{label:"Me siento cómodo con la volatilidad",desc:"Los ciclos del mercado son normales. Me enfoco en el largo plazo.",score:4},
{label:"Soy un inversor de convicción",desc:"La volatilidad cortoplacista no me afecta. Confío en el análisis y el tiempo.",score:5}
]}
];

const profiles=[
{name:"Conservador",badge:"Capital Preservation",
range:[10,20],
desc:"Su prioridad fundamental es la protección del capital. Usted prefiere retornos modestos y predecibles por encima de potencial de apreciación. Esta estrategia minimiza la exposición a mercados volátiles y prioriza activos de alta calidad y corta duración.",
alloc:[{label:"Efectivo y corto plazo",pct:70,color:"#1D9E75"},{label:"Renta fija (bonos)",pct:25,color:"#378ADD"},{label:"Renta variable (acciones)",pct:5,color:"#BA7517"}],
return:"3% – 5% anual estimado",volatility:"Muy baja",liquidity:"Alta — activos de fácil acceso",horizon:"1 a 3 años"},
{name:"Moderado-Conservador",badge:"Income-Oriented",
range:[21,29],
desc:"Usted busca generar ingresos regulares manteniendo el riesgo bajo. La cartera se centra en bonos de calidad y algo de renta variable para potenciar el retorno sin comprometer excesivamente la estabilidad.",
alloc:[{label:"Efectivo y corto plazo",pct:40,color:"#1D9E75"},{label:"Renta fija (bonos)",pct:45,color:"#378ADD"},{label:"Renta variable (acciones)",pct:15,color:"#BA7517"}],
return:"4% – 7% anual estimado",volatility:"Baja-Media",liquidity:"Media-Alta",horizon:"2 a 5 años"},
{name:"Moderado / Balanceado",badge:"Balanced",
range:[30,37],
desc:"Busca un equilibrio entre crecimiento e ingresos. Acepta cierta volatilidad a cambio de un mayor potencial de retorno. Su cartera combina renta fija para estabilidad y renta variable para apreciación.",
alloc:[{label:"Efectivo y corto plazo",pct:15,color:"#1D9E75"},{label:"Renta fija (bonos)",pct:45,color:"#378ADD"},{label:"Renta variable (acciones)",pct:40,color:"#BA7517"}],
return:"6% – 9% anual estimado",volatility:"Media",liquidity:"Media",horizon:"3 a 7 años"},
{name:"Moderado-Agresivo",badge:"Growth-Oriented",
range:[38,44],
desc:"Usted prioriza el crecimiento del capital a largo plazo y está dispuesto a asumir volatilidad significativa. Entiende que las caídas son parte del proceso y mantiene la estrategia con disciplina durante ciclos adversos.",
alloc:[{label:"Efectivo y corto plazo",pct:5,color:"#1D9E75"},{label:"Renta fija (bonos)",pct:25,color:"#378ADD"},{label:"Renta variable (acciones)",pct:70,color:"#BA7517"}],
return:"8% – 12% anual estimado",volatility:"Media-Alta",liquidity:"Media-Baja",horizon:"5 a 10 años"},
{name:"Agresivo / Especulativo",badge:"Aggressive/Speculative",
range:[45,50],
desc:"Maximizar el retorno a largo plazo es su objetivo principal. Usted tiene experiencia, horizonte amplio y convicción para mantener posiciones en entornos volátiles. La cartera se concentra en activos de alto potencial, incluyendo alternativos y mercados emergentes.",
alloc:[{label:"Efectivo y corto plazo",pct:5,color:"#1D9E75"},{label:"Renta fija (bonos)",pct:10,color:"#378ADD"},{label:"Renta variable (acciones)",pct:85,color:"#BA7517"}],
return:"10%+ anual estimado (con alta dispersión)",volatility:"Alta",liquidity:"Baja — horizonte largo requerido",horizon:"7+ años"}
];

let current=0;
let answers=new Array(questions.length).fill(null);
const categories=["Horizonte temporal","Objetivo","Tolerancia a pérdidas","Reacción ante caídas","Liquidez","Estabilidad de ingresos","Experiencia inversora","Concentración patrimonial","Dependientes financieros","Perfil psicológico"];

function getProfile(score){return profiles.find(p=>score>=p.range[0]&&score<=p.range[1])||profiles[profiles.length-1];}

function renderQuestion(){
  const q=questions[current];
  const pct=Math.round(((current+1)/questions.length)*100);
  document.getElementById('prog-label').textContent=`Pregunta ${current+1} de ${questions.length}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  const sel=answers[current];
  let optsHtml=q.options.map((o,i)=>`
    <div class="opt ${sel===i?'selected':''}" onclick="selectOpt(${i})">
      <div class="opt-radio"></div>
      <div class="opt-body">
        <div class="opt-label">${o.label}</div>
        <div class="opt-desc">${o.desc}</div>
      </div>
    </div>`).join('');
  document.getElementById('quiz-area').innerHTML=`
    <div class="q-card fade-in">
      <div class="q-number">Pregunta ${q.id} — ${categories[current]}</div>
      <div class="q-text">${q.title}</div>
      <div class="q-why">${q.why}</div>
      <div class="options">${optsHtml}</div>
    </div>
    <div class="nav">
      <button class="btn" onclick="goBack()" ${current===0?'disabled':''}>&#8592; Anterior</button>
      <span style="font-size:12px;color:var(--color-text-secondary)">${answers.filter(a=>a!==null).length} de ${questions.length} respondidas</span>
      <button class="btn primary" onclick="goNext()" ${sel===null?'disabled':''}>${current===questions.length-1?'Ver mi perfil &rarr;':'Siguiente &rarr;'}</button>
    </div>`;
}

function selectOpt(idx){
  answers[current]=idx;
  document.querySelectorAll('.opt').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  document.querySelector('.btn.primary').disabled=false;
}

function goNext(){
  if(answers[current]===null)return;
  if(current<questions.length-1){current++;renderQuestion();}
  else showResult();
}

function goBack(){if(current>0){current--;renderQuestion();}}

function showResult(){
  const totalScore=answers.reduce((sum,a,i)=>sum+(a!==null?questions[i].options[a].score:0),0);
  const profile=getProfile(totalScore);
  document.getElementById('quiz-area').classList.add('hidden');
  document.querySelector('.progress-bar').style.display='none';
  let allocHtml=profile.alloc.map(a=>`
    <div class="alloc-row">
      <div class="alloc-label">${a.label}</div>
      <div class="alloc-bar-track"><div class="alloc-bar" style="width:${a.pct}%;background:${a.color}"></div></div>
      <div class="alloc-val">hasta ${a.pct}%</div>
    </div>`).join('');
  document.getElementById('result-area').classList.remove('hidden');
  document.getElementById('result-area').innerHTML=`
    <div class="result-card fade-in">
      <div class="result-score">
        <div class="score-circle">
          <div class="score-num">${totalScore}</div>
          <div class="score-den">/ 50 pts</div>
        </div>
        <div class="score-meta">
          <div class="profile-badge">${profile.badge}</div>
          <div class="profile-name">${profile.name}</div>
        </div>
      </div>
      <div class="profile-desc">${profile.desc}</div>
      <div class="alloc-section">
        <div class="alloc-title">Asignación de activos sugerida</div>
        ${allocHtml}
      </div>
      <div class="insight-grid">
        <div class="insight-card"><div class="insight-label">Retorno esperado</div><div class="insight-value">${profile.return}</div></div>
        <div class="insight-card"><div class="insight-label">Volatilidad</div><div class="insight-value">${profile.volatility}</div></div>
        <div class="insight-card"><div class="insight-label">Liquidez</div><div class="insight-value">${profile.liquidity}</div></div>
        <div class="insight-card"><div class="insight-label">Horizonte recomendado</div><div class="insight-value">${profile.horizon}</div></div>
      </div>
      <div class="next-steps">
        <div class="ns-title">Próximos pasos recomendados</div>
        <div class="ns-item"><div class="ns-dot"></div>Agende una reunión con su asesor BlackToro para revisar este perfil en detalle y validar los supuestos.</div>
        <div class="ns-item"><div class="ns-dot"></div>Complete el cuestionario de apertura de cuenta (Know Your Customer) con información patrimonial más detallada.</div>
        <div class="ns-item"><div class="ns-dot"></div>Su asesor preparará una Investment Policy Statement (IPS) personalizada basada en este perfil.</div>
        <div class="ns-item"><div class="ns-dot"></div>Revisaremos el perfil anualmente o ante cambios significativos en su situación financiera o personal.</div>
      </div>
      <div class="disclaimer">&#9888; Este cuestionario es orientativo y no constituye asesoramiento de inversión. Los retornos estimados son ilustrativos y no garantizados. Las asignaciones son rangos máximos — la cartera real se diseña individualmente. Este output requiere revisión y validación por un asesor registrado antes de tomar cualquier decisión de inversión. BlackToro Global Wealth Management — SEC Registered Investment Adviser.</div>
    </div>
    <div style="display:flex;justify-content:center;margin-top:0.5rem">
      <button class="restart-btn" onclick="restart()">&#8592; Reiniciar cuestionario</button>
    </div>`;
}

function restart(){
  current=0;answers=new Array(questions.length).fill(null);
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('result-area').innerHTML='';
  document.getElementById('quiz-area').classList.remove('hidden');
  document.querySelector('.progress-bar').style.display='flex';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
